site_name: Shula Moodle Plugin
site_description: Documentation for the local_shula Moodle plugin.
site_author: Shula AI

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Services:
    - Payload Builder: services/payload_builder.md
    - API Client: services/client.md
  - Tasks & Webhooks:
    - Event Observer: tasks/observer.md
    - Background Tasks: tasks/background_tasks.md
  - Testing: testing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

