site_name: Shula Moodle Plugin
site_description: Documentation for the local_shula Moodle plugin.
site_author: Shula AI

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Services:
    - Payload Builder: services/payload_builder.md
    - API Client: services/client.md
  - Tasks & Webhooks:
    - Event Observer: tasks/observer.md
    - Background Tasks: tasks/background_tasks.md
  - Testing: testing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

plugins: 
  - search
  - mkdocstrings:
        handlers:
            python:
                paths: ["."] # Looks at your root directory to find 'apps'
                options:
                    show_root_heading: true
                    show_source: false
                    docstring_style: google # standard for modern Python
                    merge_init_into_class: true
  - to-pdf:
        enabled_if_env: ENABLE_PDF_EXPORT
        author: Shula AI Team
        cover_title: Shula AI Developer Portal
        output_path: pdf/document.pdf
        render_js: true
        headless_chrome_path: '/Applications/Google Chrome.app/Contents/MacOS/Google Chrome'