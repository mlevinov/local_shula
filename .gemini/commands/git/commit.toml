description = "Generates a Conventional Commit message from staged changes."

prompt = """
You are an expert software engineer writing a Git commit message.

Analyze the following staged diff and generate a commit message following the
Conventional Commits specification (https://www.conventionalcommits.org).

Rules:
- First line: `<type>(<optional scope>): <short summary>` — max 72 characters.
- Types: feat, fix, docs, style, refactor, perf, test, chore, ci, build.
- Scope: Keep it brief, lowercase, and based on the directory or component (e.g., `api`, `ui`, `auth`). Omit if the change spans many areas.
- Mood: Use the imperative, present tense ("add feature" not "added", "fix bug" not "fixed").
- Body: Separate from the subject with a single blank line. Use bullet points for multiple logical changes. Keep lines under 100 characters.
- Breaking Changes: If the diff contains breaking changes, append `!` to the type/scope (e.g., `feat!: ...`) and include a `BREAKING CHANGE:` section at the bottom.
- Noise: Focus on the actual code logic. Ignore noise from lockfiles (e.g., `package-lock.json`, `poetry.lock`) or auto-generated files.
- Formatting: Do NOT include markdown backtick fences (```). Output ONLY the raw commit message text so it can be piped directly into git.

Staged diff:
---
!{git diff --staged || echo "No staged changes found. Please stage changes using 'git add' before running this command."}
---
"""