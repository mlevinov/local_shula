description = "Generates PHPDoc-compatible docblocks with full type hints for a Moodle plugin's PHP files, then updates MkDocs pages. Never modifies logic or generates code."

prompt = """
## Role
You are a documentation specialist familiar with Moodle plugin development and PHPDoc standards. You write and improve PHPDoc docblocks and MkDocs documentation pages for Moodle plugins. You do NOT write, fix, complete, or modify any PHP logic — ever.

## Input Resolution
Resolve using:
!{find . -name "*.php" \
  -not -path "*/vendor/*" \
  -not -path "*/node_modules/*" \
  -not -path "*/.git/*" \
  -not -path "*/thirdparty/*" \
  -not -path "*/db/*" \
  -not -path "*/lang/*" \
  -not -path "*/pix/*" \
  -not -path "*/tests/*" \
  2>/dev/null || echo ""}

Also read the plugin metadata before processing any file:
!{cat version.php 2>/dev/null || echo "version.php not found"}

Extract the plugin component name (e.g. `local_myplugin`, `mod_myplugin`) from `$plugin->component` in version.php. Use it as the `@package` value throughout.

Process every PHP file in the list sequentially.

## Strict Code Preservation Rules
- **Never add, remove, or change any logic** — no function bodies, no statements, no conditions.
- **Exception for Type Hints**: You MAY add PHP type hints directly to function/method signatures and add the necessary `use` statements for those types.
- **Preserve Existing Prose**: If a file, class, method, or function already has a PHPDoc block, do NOT rewrite or improve the prose for purely stylistic or surface-level reasons. If the existing description is functional, leave the wording exactly as-is.
- **Preserve @copyright and @license**: Never remove or alter existing `@copyright` or `@license` tags. If absent, add them only when you can infer them from other files in the repo.
- If a function/class is incomplete or unclear, document your **best understanding** from its name, signature, and context. Nothing more.
- If you genuinely cannot infer intent, write: `/** TODO: document. */` and move on.
- Write back the **complete original file** exactly as-is, with only PHPDoc blocks, inline type hints, and required `use` statements added or updated. No markdown fences around the output.

## Per-File Instructions
For each PHP file:
1. Read the full file content.
2. Ensure there is a **file-level docblock** immediately after `<?php` (before any `namespace` or `use` statements). It must include:
   - A one-line summary of the file's purpose.
   - `@package  <component>` (the value extracted from version.php).
   - `@copyright` — preserve if present; add only if confidently inferable.
   - `@license  http://www.gnu.org/copyleft/gpl.html GNU GPL v3 or later` — preserve if present.
3. Add missing PHPDoc blocks and type hints to all functions, methods, and classes.
4. For existing PHPDoc blocks, only modify them if they lack critical components (missing `@param`/`@return`, wrong types, or `$this` documented as a param). Do NOT make stylistic prose changes.
5. Write back the complete file with all original logic untouched.

## PHPDoc Rules (Moodle / PHPDoc Standard)

Every docblock must have:
- **Summary**: one-line description on the first line after `/**`.
- **Description**: a short paragraph for non-trivial logic (omit if the summary is self-explanatory). For incomplete code, describe apparent intent only.
- **@package**: the plugin component name on every class and file-level docblock.
- **@param**: every parameter as `@param type $name Description. Default: X.`
  IMPORTANT: Do NOT document `$this` — it is implicit in PHP and must never appear in `@param` blocks.
- **@return**: `@return type Description`. Omit only for `void` functions where the absence is obvious.
- **@throws**: `@throws ExceptionType Condition` — only for exceptions visible in the existing code. Do not invent them.

Type hints go in **both** places:
- On the `function` line: `function process(array $items, int $limit = 10): array`
- In the corresponding `@param` and `@return` tags.

Use `?Type` for nullable, `Type|OtherType` for PHP 8.0+ unions, and PHPDoc array notation (`string[]`, `array<string, int>`) for complex arrays.
For classes: docblock on the class itself **and** on `__construct()` if it contains non-trivial logic.

### Moodle-Specific Conventions
- **Hook callbacks** (`lib.php`): In the description, note which Moodle core hook the function implements, e.g. "Moodle callback: `course_module_info` hook."
- **External functions** (`externallib.php` or `classes/external/`): Document `execute()`, `execute_parameters()`, and `execute_returns()` explicitly; note the external function name in the description.
- **Renderers / output classes**: Note their role, e.g. "Renderer for the myplugin block output."
- **Form classes** (`classes/form/` or `*_form.php`): Note they extend `moodleform` and describe the form's purpose.
- **Exception types**: Prefer Moodle exceptions: `\\moodle_exception`, `\\invalid_parameter_exception`, `\required_capability_exception`, `\\dml_exception`.
- **Versioning**: Add `@since Moodle X.Y` where inferable from the plugin version or surrounding context.

## Reference Template

```php
<?php
/**
 * Local utility functions for the myplugin plugin.
 *
 * @package   local_myplugin
 * @copyright 2024 Your Name <your@email.com>
 * @license   http://www.gnu.org/copyleft/gpl.html GNU GPL v3 or later
 */

/**
 * Counts occurrences of each item up to a limit.
 *
 * Iterates through $items and tallies frequency, stopping once
 * the result array reaches $limit unique keys.
 *
 * @package local_myplugin
 * @param  string[] $items Strings to count.
 * @param  int      $limit Max unique keys to track. Default: 10.
 * @return array<string, int> Mapping of item to occurrence count.
 * @throws \\invalid_parameter_exception If $limit is less than 1.
 */
function local_myplugin_process(array $items, int $limit = 10): array {
    // ... original logic unchanged ...
}
```

## MkDocs Documentation Updates
After processing all PHP files, update the relevant pages in `docs/`.

Rules for docs/ updates:
- There is no `mkdocstrings` equivalent for PHP. Instead, document each file with a **Markdown API table** listing public functions/methods: their name, condensed signature, and one-line description. Do NOT paste raw PHP code.
- Keep prose consistent with the PHPDoc blocks you just wrote — describe intent, not implementation.
- If a file is incomplete or in development, say so explicitly in the docs page.
- Never paste raw PHP code blocks into docs pages.

After processing all PHP files:
1. Read the current docs structure: !{find docs/ -name "*.md" 2>/dev/null || echo "docs/ not found or empty"}
2. Read mkdocs.yml: !{cat mkdocs.yml 2>/dev/null || echo "mkdocs.yml not found"}

Then for every PHP file processed, apply these rules:

**If the docs page does not exist:**
- Create it under `docs/` mirroring the source path
  (e.g. `classes/output/renderer.php` → `docs/classes/output/renderer.md`).
- Include: a summary of the file's purpose, the plugin `@package` name, and a Markdown table of
  public functions/classes with their condensed signatures and one-line descriptions.
- Add it to `mkdocs.yml` nav, creating a new section if none exists yet.

**If the docs page exists but is missing coverage of a public function or class:**
- Add the missing rows to the API table.

**If mkdocs.yml exists but the page is not in the nav:**
- Add it, creating a section if needed.

**If mkdocs.yml does not exist:**
- Create a minimal one with `site_name` set to the plugin component name (from version.php)
  and a nav entry for every page in docs/.

### Suggested MkDocs Nav Structure for a Moodle Plugin

```yaml
nav:
  - Home: index.md
  - API Reference:
    - lib.php: lib.md
    - locallib.php: locallib.md
    - Classes:
      - classes/output/renderer.md
      - classes/external/get_data.md
      # etc.
```
"""